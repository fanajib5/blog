baseURL = "https://najib.id"
defaultContentLanguage = "id"
languageCode = "id-ID"
staticDir = "static"
title = "Blogfolio Najib"
# defaultContentLanguageInSubdir = true
canonifyURLs = true
copyright = "This work is licensed under a Creative Commons Attribution-NonCommercial 4.0 International License."
enableRobotsTXT = true
theme = "retro-jib"

enableGitInfo = true

[security.funcs]
getenv = ['^HUGO_', '^CI$', '^WEB3FORMS_KEY$']

[languages]
[languages.id]
languageCode = "id-ID"
languageName = "Bahasa Indonesia"
weight = 1
[languages.en]
languageCode = "en-US"
languageName = "English"
weight = 2

[markup]
defaultMarkdownHandler = "goldmark"

[markup.tableOfContents]
endLevel = 4
ordered = false
startLevel = 2

[markup.goldmark.renderer]
unsafe = true
[markup.goldmark.parser]
wrapStandAloneImageWithinParagraph = false
[markup.goldmark.parser.attribute]
block = true
title = true
[markup.highlight]
anchorLineNos = false
codeFences = true
guessSyntax = false
hl_Lines = ""
hl_inline = false
lineAnchors = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
noClasses = true
noHl = false
style = "modus-vivendi"
tabWidth = 4

[taxonomies]
  tag = "tags"

[params]
description = "Faiq Najib — Backend Developer, Independent Builder & Educator. Blog personal dan portofolio profesional."
images = ["apple-touch-icon.png"]

[[params.author]]
name = "Faiq Najib"

